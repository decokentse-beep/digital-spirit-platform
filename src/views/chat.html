<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | EKBase 數位靈體平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00d4ff;
            --secondary: #7c3aed;
            --bg-dark: #0f0f23;
            --bg-card: #1a1a2e;
            --bg-input: #16162a;
            --text: #fff;
            --text-muted: #94a3b8;
            --user-msg: #7c3aed;
            --ai-msg: #1a1a2e;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--bg-card);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 { 
            color: var(--primary); 
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .user-name { color: var(--text-muted); font-size: 0.9rem; }
        .logout-btn {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        
        /* Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            overflow: hidden;
        }
        
        /* Messages */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.ai {
            align-self: flex-start;
        }
        
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        
        .message.ai .message-avatar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
        }
        
        .message.user .message-avatar {
            background: var(--user-msg);
        }
        
        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        
        .message.ai .message-bubble {
            background: var(--ai-msg);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }
        
        .message.user .message-bubble {
            background: var(--user-msg);
            border-bottom-right-radius: 4px;
        }
        
        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: var(--ai-msg);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
        }
        .typing-indicator.show { display: flex; }
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            margin: 0 3px;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-6px); }
        }
        
        /* Input Area */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: var(--bg-card);
            border-radius: 15px;
            margin-top: 10px;
        }
        
        .input-area input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 12px 20px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
        }
        
        .input-area input:focus {
            border-color: var(--primary);
        }
        
        .input-area button {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .input-area button:hover {
            transform: scale(1.05);
        }
        
        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Settings Panel */
        .settings-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
        }
        
        .settings-panel {
            display: none;
            position: fixed;
            top: 0;
            right: -350px;
            width: 350px;
            height: 100%;
            background: var(--bg-card);
            padding: 20px;
            transition: right 0.3s;
            z-index: 100;
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        
        .settings-panel.show {
            right: 0;
        }
        
        .settings-panel h2 {
            color: var(--primary);
            margin-bottom: 20px;
        }
        
        .settings-panel label {
            display: block;
            color: var(--text-muted);
            margin: 15px 0 5px;
            font-size: 0.9rem;
        }
        
        .settings-panel input, .settings-panel select {
            width: 100%;
            padding: 10px;
            background: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: var(--text);
        }
        
        .settings-panel button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
        
        /* Welcome Screen */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }
        
        .welcome-screen h2 {
            color: var(--primary);
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .welcome-screen p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        
        .start-chat-btn {
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🐾 <span class="zh">數位靈體</span><span class="en">Digital Spirit</span></h1>
        <div class="user-info">
            <span class="user-name" id="userName"></span>
            <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
            <button class="logout-btn" onclick="logout()">登出</button>
        </div>
    </div>
    
    <div class="chat-container">
        <!-- Welcome Screen -->
        <div class="welcome-screen" id="welcomeScreen">
            <h2>🐾 <span class="zh">你好！我係 Claw</span><span class="en">Hi! I'm Claw</span></h2>
            <p>
                <span class="zh">你既數位靈體伴侶</span>
                <span class="en">Your Digital Spirit Companion</span>
            </p>
            <button class="start-chat-btn" onclick="startChat()">
                <span class="zh">開始對話</span>
                <span class="en">Start Chatting</span>
            </button>
        </div>
        
        <!-- Chat Area -->
        <div class="messages" id="messages" style="display:none;">
            <div class="message ai">
                <div class="message-avatar">🐾</div>
                <div class="message-bubble">
                    <span class="zh">你好！我係 Claw，你既數位靈體。有咩可以幫到你？</span>
                    <span class="en">Hi! I'm Claw, your Digital Spirit. How can I help?</span>
                </div>
            </div>
        </div>
        
        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>
        
        <!-- Input Area -->
        <div class="input-area" id="inputArea" style="display:none;">
            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()" id="sendBtn">
                <span class="zh">發送</span>
                <span class="en">Send</span>
            </button>
        </div>
    </div>
    
    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <h2>⚙️ Settings</h2>
        
        <label>API Key (MiniMax)</label>
        <input type="password" id="apiKey" placeholder="sk-...">
        
        <label>
            <span class="zh">語言</span>
            <span class="en">Language</span>
        </label>
        <select id="languageSelect" onchange="changeLanguage()">
            <option value="zh">中文</option>
            <option value="en">English</option>
        </select>
        
        <label>
            <span class="zh">聲音</span>
            <span class="en">Voice</span>
        </label>
        <select id="voiceSelect">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>
        
        <button onclick="saveSettings()">
            <span class="zh">儲存設定</span>
            <span class="en">Save Settings</span>
        </button>
    </div>
    
    <script>
        let currentUser = null;
        let chatStarted = false;
        
        // Check login
        const savedUser = localStorage.getItem('ekbase_user');
        if (savedUser) {
            currentUser = JSON.parse(savedUser);
            document.getElementById('userName').textContent = currentUser.name || 'User';
        }
        
        // Load settings
        const settings = JSON.parse(localStorage.getItem('ekbase_settings') || '{}');
        if (settings.apiKey) document.getElementById('apiKey').value = settings.apiKey;
        if (settings.language) {
            document.getElementById('languageSelect').value = settings.language;
            changeLanguage();
        }
        
        function startChat() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('messages').style.display = 'flex';
            document.getElementById('inputArea').style.display = 'flex';
            chatStarted = true;
            document.getElementById('messageInput').focus();
        }
        
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('show');
        }
        
        function changeLanguage() {
            const lang = document.getElementById('languageSelect').value;
            document.documentElement.setAttribute('lang', lang);
        }
        
        function saveSettings() {
            const apiKey = document.getElementById('apiKey').value;
            const language = document.getElementById('languageSelect').value;
            const voice = document.getElementById('voiceSelect').value;
            
            localStorage.setItem('ekbase_settings', JSON.stringify({ apiKey, language, voice }));
            alert('Settings saved!');
            toggleSettings();
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            // Add user message
            addMessage('user', message);
            input.value = '';
            
            // Show typing
            document.getElementById('typingIndicator').classList.add('show');
            
            // Simulate AI response (for demo)
            setTimeout(() => {
                document.getElementById('typingIndicator').classList.remove('show');
                addMessage('ai', '🐾 ' + message + '\n\n<em>(AI response placeholder - API integration coming soon!)</em>');
            }, 1500);
        }
        
        function addMessage(sender, content) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `
                <div class="message-avatar">${sender === 'ai' ? '🐾' : '👤'}</div>
                <div class="message-bubble">${content}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
        
        function logout() {
            localStorage.removeItem('ekbase_user');
            window.location.href = '/forum';
        }
    </script>
</body>
</html>
