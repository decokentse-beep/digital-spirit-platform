<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><span class="zh">升級</span><span class="en" style="display:none">Upgrade</span>付費 - EKBase</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        :root { --primary: #00d4ff; --secondary: #7c3aed; --accent: #f59e0b; --success: #10b981; --bg-dark: #0f0f1a; --bg-darker: #0a0a12; --text: #e2e8f0; --text-muted: #94a3b8; }
        body { background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%); color: var(--text); font-family: 'Noto Sans HK', sans-serif; min-height: 100vh; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 30px 0; }
        .header h1 { color: var(--primary); margin: 0; }
        .nav-back { position: absolute; top: 20px; left: 20px; color: var(--text-muted); text-decoration: none; }
        
        .coming-soon { text-align: center; padding: 60px 20px; }
        .coming-soon h2 { color: var(--success); font-size: 1.5rem; }
        .coming-soon p { color: var(--text-muted); margin-top: 20px; font-size: 1.1rem; }
        
        .btn { display: inline-block; padding: 15px 30px; background: var(--primary); border: none; border-radius: 10px; color: #000; font-size: 1rem; font-weight: bold; text-decoration: none; margin-top: 30px; }
        
        .locked-overlay { text-align: center; padding: 60px 20px; }
        .locked-overlay h2 { color: var(--accent); }
    </style>
</head>
<body>
<button onclick="toggleLang()" style="background:none;border:1px solid var(--text-muted);padding:5px 10px;border-radius:5px;color:var(--text-muted);cursor:pointer;font-size:0.8rem;">EN</button>
    <a href="/profile" class="nav-back">← 返回<span class="zh">個人檔案</span><span class="en" style="display:none">Profile</span></a>
    <div class="container">
        <div class="header">
            <h1>💎 <span class="zh">升級</span><span class="en" style="display:none">Upgrade</span>付費</h1>
        </div>
        
        <!-- Paid users: Coming Soon -->
        <div class="coming-soon" id="paidSection">
            <h2>🎉 感謝支持！</h2>
            <p>你已經解鎖所有功能！</p>
            <p style="margin-top:30px;">🚀 新功能即將推出，敬請期待...</p>
            <a href="/forum" class="btn">前往<span class="zh">論壇</span><span class="en" style="display:none">Forum</span> →</a>
        </div>
        
        <!-- Free users: Coming Soon (simplified) -->
        <div class="locked-overlay" id="freeSection" style="display:none;">
            <h2>🔒 即將推出</h2>
            <p style="margin-top:20px;">Premium 功能正在準備中，敬請期待！</p>
            <p style="margin-top:15px; color:var(--text-muted);">多謝支持 EKBase！</p>
        </div>
    </div>
    
    <script>
    async function checkPaymentStatus() {
        const user = JSON.parse(localStorage.getItem('ekbase_user') || localStorage.getItem('user') || '{}');
        if (!user.email) {
            document.getElementById('paidSection').style.display = 'none';
            document.getElementById('freeSection').style.display = 'block';
            return;
        }
        
        try {
            const res = await fetch('/api/payment/status?email=' + user.email);
            const data = await res.json();
            
            if (data.paid) {
                document.getElementById('paidSection').style.display = 'block';
                document.getElementById('freeSection').style.display = 'none';
            } else {
                document.getElementById('paidSection').style.display = 'none';
                document.getElementById('freeSection').style.display = 'block';
            }
        } catch (e) {
            document.getElementById('paidSection').style.display = 'none';
            document.getElementById('freeSection').style.display = 'block';
        }
    }
    
    window.addEventListener('DOMContentLoaded', checkPaymentStatus);
    </script>

        <script>
        function toggleLang() {
            const currentLang = localStorage.getItem("ekbase_lang") || "zh";
            const newLang = currentLang === "zh" ? "en" : "zh";
            localStorage.setItem("ekbase_lang", newLang);
            location.reload();
        }
        
        window.addEventListener("DOMContentLoaded", () => {
            const lang = localStorage.getItem("ekbase_lang") || "zh";
            if (lang === "en") {
                document.querySelectorAll(".zh").forEach(el => el.style.display = "none");
                document.querySelectorAll(".en").forEach(el => el.style.display = "inline");
            }
        });
        </script>
</body>
</html>
