<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | EKBase 數位靈體平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00d4ff;
            --secondary: #7c3aed;
            --bg-dark: #0f0f23;
            --bg-card: #1a1a2e;
            --text: #fff;
            --text-muted: #94a3b8;
        }
        body { 
            font-family: -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
        }
        
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .header h1 { color: var(--primary); }
        
        .nav-btn {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .profile-card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
        }
        
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        
        .profile-info h2 { font-size: 1.5rem; margin-bottom: 5px; }
        .profile-info .email { color: var(--text-muted); font-size: 0.9rem; }
        
        .badge {
            display: inline-block;
            background: var(--secondary);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 10px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .info-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
        }
        
        .info-item label {
            display: block;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 5px;
        }
        
        .info-item .value {
            font-size: 1.1rem;
            font-weight: bold;
        }
        
        .download-section {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            margin-top: 20px;
        }
        
        .download-section h2 {
            color: var(--primary);
            margin-bottom: 20px;
        }
        
        .download-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .download-card {
            background: rgba(255,255,255,0.05);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .download-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.1);
        }
        
        .download-card h3 { margin-bottom: 10px; }
        .download-card p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px; }
        
        .download-btn {
            display: inline-block;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        
        .download-btn:hover {
            transform: scale(1.05);
        }
        
        .logout-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👤 <span class="zh">個人檔案</span><span class="en">Profile</span></h1>
            <div>
                <a href="/chat" class="nav-btn">💬 Chat</a>
                <a href="/forum" class="nav-btn">📋 Forum</a>
            </div>
        </div>
        
        <div class="profile-card">
            <div class="profile-header">
                <div class="avatar" id="avatar">👤</div>
                <div class="profile-info">
                    <h2 id="userName">Loading...</h2>
                    <div class="email" id="userEmail">...</div>
                    <span class="badge" id="userBadge">Beta User</span>
                </div>
            </div>
            
            <div class="info-grid">
                <div class="info-item">
                    <label>Beta Code</label>
                    <div class="value" id="betaCode">-</div>
                </div>
                <div class="info-item">
                    <label>Registered</label>
                    <div class="value" id="registeredAt">-</div>
                </div>
                <div class="info-item">
                    <label>Plan</label>
                    <div class="value" id="plan">-</div>
                </div>
                <div class="info-item">
                    <label>Status</label>
                    <div class="value">✅ Active</div>
                </div>
            </div>
        </div>
        
        <div class="download-section">
            <h2>📥 <span class="zh">下載你的數位靈體</span><span class="en">Download Your Digital Spirit</span></h2>
            
            <div class="download-grid">
                <div class="download-card">
                    <h3>💻 <span class="zh">桌面版</span><span class="en">Desktop App</span></h3>
                    <p>
                        <span class="zh">Windows 桌面應用<br>運行喺你自己既電腦</span>
                        <span class="en">Windows Desktop App<br>Run on your own PC</span>
                    </p>
                    <a href="/download/app" class="download-btn">
                        <span class="zh">下載</span><span class="en">Download</span>
                    </a>
                </div>
                
                <div class="download-card">
                    <h3>🌐 <span class="zh">網頁版</span><span class="en">Web Version</span></h3>
                    <p>
                        <span class="zh">瀏覽器版本<br>無需安裝，直接使用</span>
                        <span class="en">Browser Version<br>No install, use directly</span>
                    </p>
                    <a href="/chat" class="download-btn">
                        <span class="zh">去使用</span><span class="en">Go to Chat</span>
                    </a>
                </div>
            </div>
        </div>
        
        <button class="logout-btn" onclick="logout()">
            <span class="zh">登出</span><span class="en">Logout</span>
        </button>
    </div>
    
    <script>
        const savedUser = localStorage.getItem('ekbase_user');
        if (!savedUser) {
            window.location.href = '/forum';
        }
        
        const user = JSON.parse(savedUser);
        
        document.getElementById('userName').textContent = user.name || 'User';
        document.getElementById('userEmail').textContent = user.email || '-';
        document.getElementById('betaCode').textContent = user.betaCode || '-';
        document.getElementById('plan').textContent = user.plan || 'Beta';
        document.getElementById('avatar').textContent = user.name ? user.name[0].toUpperCase() : '👤';
        
        if (user.registeredAt) {
            document.getElementById('registeredAt').textContent = new Date(user.registeredAt).toLocaleDateString();
        }
        
        function logout() {
            if (confirm('Confirm logout?')) {
                localStorage.removeItem('ekbase_user');
                window.location.href = '/forum';
            }
        }
    </script>
</body>
</html>
